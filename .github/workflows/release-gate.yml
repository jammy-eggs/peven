name: Release Gate

on:
  pull_request:
    paths:
      - ".github/workflows/release-gate.yml"
      - ".github/workflows/publish.yml"
      - "pyproject.toml"
      - "README.md"
      - "LICENSE"
      - "src/peven/**"
      - "tests/**"
      - "uv.lock"
  push:
    paths:
      - ".github/workflows/release-gate.yml"
      - ".github/workflows/publish.yml"
      - "pyproject.toml"
      - "README.md"
      - "LICENSE"
      - "src/peven/**"
      - "tests/**"
      - "uv.lock"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Install development dependencies
        run: uv sync --dev

      - name: Lint
        run: uv run ruff check src tests

      - name: Run test suite
        run: uv run pytest -q

      - name: Build distribution artifacts
        run: uv build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v6
        with:
          name: dist
          path: dist/*

  uv-add-smoke:
    needs: build-and-test
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Download build artifacts
        uses: actions/download-artifact@v5
        with:
          name: dist
          path: dist

      - name: Install from wheel with uv and run an authoring smoke
        run: |
          tmpdir="$(mktemp -d)"
          uv init --bare "$tmpdir/uv-add-smoke"
          cd "$tmpdir/uv-add-smoke"
          uv add "$GITHUB_WORKSPACE"/dist/peven-*.whl
          uv run peven setup --help
          uv run python - <<'PY'
          import peven

          @peven.executor("finish")
          async def finish(ctx, store):
              return {}

          @peven.env("uv_add_smoke")
          class UVAddSmoke:
              ready = peven.place()
              done = peven.place(terminal=True)
              step = peven.transition(
                  inputs=["ready"],
                  outputs=["done"],
                  executor="finish",
              )

          lowered = peven.net(UVAddSmoke).lower()
          assert lowered["name"] == "uv_add_smoke"
          assert [t["executor"] for t in lowered["transitions"]] == ["finish"]

          marking = peven.initialMarking(
              runKey=peven.runKey("smoke#g0"),
              tokens=[("ready", "seed", {"ok": True})],
          )
          assert marking.lower()["tokensByPlace"]["ready"][0]["runKey"] == "smoke#g0"
          PY
